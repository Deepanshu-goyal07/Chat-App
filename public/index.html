<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Textie</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <h1>Textie </h1>

    <div id="login-container">
        <h3>Enter your name to join:</h3>
        <form id="login-form" action="">
            <input id="username-input" autocomplete="off" required placeholder="Your username"
                style="padding: 0.5rem; margin-right: 0.5rem;" />
            <button type="submit" style="padding: 0.5rem;">Join</button>
        </form>
    </div>

    <div id="chat-container" style="display: none;">
        <div>
            <strong>Logged in as:</strong> <span id="my-username"></span>
        </div>
        <div style="margin-top: 0.5rem;">
            <strong>Online Users (Click to chat):</strong>
            <span id="users-list"></span>
        </div>
        <hr />
        <h3 id="chat-header">Select an online user to start chatting</h3>
        <ul id="messages"></ul>
        <form id="form" action="" style="display: none;">
            <input id="input" autocomplete="off" /><button>Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js"></script>
</body>

</html>
